name: Manter Supabase ativo
# O plano gratuito do Supabase pausa projetos após ~7 dias sem atividade.
# Este toque 2x/dia garante que a app e os links de bilhetes nunca ficam offline.
on:
  schedule:
    - cron: '17 6 * * *'
    - cron: '17 18 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Toque ao Supabase
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://wdfixavttqfsawcluylb.supabase.co/rest/v1/games?select=id&limit=1" \
            -H "apikey: sb_publishable_acIC6QVVKeGsTAYLBgisLQ_4dPG3tei" \
            -H "Authorization: Bearer sb_publishable_acIC6QVVKeGsTAYLBgisLQ_4dPG3tei")
          echo "Resposta: $code"
          if [ "$code" != "200" ]; then
            echo "::warning::O Supabase respondeu $code — verificar o projeto."
          fi
